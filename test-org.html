<!DOCTYPE html>
<html>
<head>
<style>
body { background: #f8fafc; font-family: sans-serif; }
.organigram-wrapper {
  overflow: auto;
  padding: 40px;
  background: #f8fafc;
  border-radius: 16px;
  border: 1px solid #e2e8f0;
  min-height: 500px;
}

/* Horizontal Tree Layout */
.tree ul {
  padding-left: 30px;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 16px;
  margin: 0;
  list-style: none;
}

.tree > ul {
  padding-left: 0;
}

.tree li {
  display: flex;
  align-items: center;
  position: relative;
  padding-left: 30px;
}

.tree > ul > li {
  padding-left: 0;
}

/* Connecting lines */
.tree li::before, .tree li::after {
  content: '';
  position: absolute;
  left: 0;
}

/* Horizontal line to the node */
.tree li::before {
  border-top: 2px solid #cbd5e1;
  top: 50%;
  width: 30px;
  height: 0;
}

/* Vertical line connecting siblings */
.tree li::after {
  border-left: 2px solid #cbd5e1;
  height: 100%;
  top: 0;
  width: 0;
}

/* Adjust first and last child vertical lines */
.tree li:first-child::after {
  height: 50%;
  top: 50%;
}
.tree li:last-child::after {
  height: 50%;
  bottom: 50%;
  top: auto;
}
.tree li:only-child::after {
  display: none;
}

/* Hide lines for root node */
.tree > ul > li::before, .tree > ul > li::after {
  display: none;
}

/* Line from parent to children group */
.tree ul::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  border-top: 2px solid #cbd5e1;
  width: 30px;
}
.tree > ul::before {
  display: none;
}

/* Card Styling to match the image */
.node-card {
  display: flex;
  align-items: center;
  background: #333333; /* Dark background like in the image */
  color: white;
  padding: 12px;
  border-radius: 8px;
  border: 3px solid #cbd5e1; /* Light border */
  min-width: 250px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
  z-index: 1;
}

/* Alternating colors */
.tree > ul > li > .node-card {
  background: #222222;
  border-color: #94a3b8;
}

.tree > ul > li > ul > li > .node-card {
  background: #d4a373;
  border-color: #faedcd;
  color: #333;
}

.tree > ul > li > ul > li > ul > li > .node-card {
  background: #4a4036;
  border-color: #e2e8f0;
}

.node-photo {
  width: 60px;
  height: 60px;
  border-radius: 4px;
  object-fit: cover;
  margin-right: 16px;
  background: #e2e8f0;
}

.node-info {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  flex: 1;
}

.node-name {
  font-weight: bold;
  font-size: 15px;
  margin-bottom: 4px;
}

.node-title {
  font-size: 12px;
  opacity: 0.9;
}
</style>
</head>
<body>
  <div class="organigram-wrapper">
    <div class="tree">
      <ul>
        <li>
          <div class="node-card">
            <div class="node-photo"></div>
            <div class="node-info">
              <div class="node-name">Root User</div>
              <div class="node-title">President</div>
            </div>
          </div>
          <ul>
            <li>
              <div class="node-card">
                <div class="node-photo"></div>
                <div class="node-info">
                  <div class="node-name">Child 1</div>
                  <div class="node-title">VP</div>
                </div>
              </div>
              <ul>
                <li>
                  <div class="node-card">
                    <div class="node-photo"></div>
                    <div class="node-info">
                      <div class="node-name">Grandchild 1</div>
                      <div class="node-title">Staff</div>
                    </div>
                  </div>
                </li>
              </ul>
            </li>
            <li>
              <div class="node-card">
                <div class="node-photo"></div>
                <div class="node-info">
                  <div class="node-name">Child 2</div>
                  <div class="node-title">Sec</div>
                </div>
              </div>
            </li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</body>
</html>
